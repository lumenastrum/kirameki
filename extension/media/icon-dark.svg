<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Badge background -->
  <polygon points="64,12 110,38 110,90 64,116 18,90 18,38"
    fill="#091825" stroke="#66ccff" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Connections -->
  <line x1="64" y1="55" x2="64" y2="38" stroke="#66ccff" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>
  <line x1="71" y1="69" x2="86" y2="78" stroke="#66ccff" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>
  <line x1="57" y1="69" x2="42" y2="78" stroke="#66ccff" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>
  <!-- Satellite nodes -->
  <circle cx="64" cy="35" r="6" fill="#66ccff" opacity="0.7"/>
  <circle cx="88" cy="80" r="6" fill="#66ccff" opacity="0.7"/>
  <circle cx="40" cy="80" r="6" fill="#66ccff" opacity="0.7"/>
  <!-- Satellite highlights -->
  <circle cx="63" cy="33.5" r="2" fill="#fff" opacity="0.45"/>
  <circle cx="87" cy="78.5" r="2" fill="#fff" opacity="0.45"/>
  <circle cx="39" cy="78.5" r="2" fill="#fff" opacity="0.45"/>
  <!-- Center pulse ring -->
  <circle cx="64" cy="64" r="16" stroke="#66ccff" stroke-width="1.5" opacity="0.18" fill="none"/>
  <!-- Center node with glow -->
  <circle cx="64" cy="64" r="10" fill="#66ccff" filter="url(#glow)"/>
  <circle cx="62.5" cy="62" r="3.5" fill="#fff" opacity="0.65"/>
</svg>
